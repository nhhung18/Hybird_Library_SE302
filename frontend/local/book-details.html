<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="image/icon_text.png">
    <title>Chi tiết sách - HAB Lib</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/book-details.css">
</head>
<body>

<header class="header">
    <div class="header-1">
        <a href="index.html" class="logo"> Thư viện HAB </a>
        <form action="" class="search-form">
            <input type="search" placeholder="tìm kiếm sách..." id="search-box">
            <label for="search-box" class="fas fa-search"></label>
        </form>
        <div class="icons">
            <div id="search-btn" class="fas fa-search"></div>
            <a href="#" id="wishlist-btn" class="fas fa-heart" title="Yêu thích"></a>
            <a href="#" id="cart-btn" class="fas fa-shopping-cart" title="Giỏ hàng">
                <span id="cart-count" class="cart-badge">0</span>
            </a>
            <div id="login-btn" class="fas fa-user" title="Tài khoản"></div>
        </div>
    </div>
    <div class="header-2">
        <nav class="navbar">
            <a href="index.html">Trang chủ</a>
            <a href="books.html">Sách</a>
            <a href="index.html#reviews">Đánh giá</a>
            <a href="index.html#blogs">Về chúng tôi</a>
        </nav>
    </div>
</header>
<nav class="bottom-navbar">
    <a href="index.html" class="fas fa-home"></a>
    <a href="books.html" class="fas fa-list"></a>
</nav>

<section class="book-details">
    <div class="row">
        <div class="image-col">
            <img src="" alt="Book Image" id="MainImg">
        </div>

        <div class="content-col">
            <h2 class="book-title" id="bookTitle">Đang tải...</h2>
            <div class="rating-display">
                <span id="ratingStars"></span>
                <span id="reviewCount"></span>
            </div>      
            <div style="background:#f0f9f7; padding:1.5rem; border-radius:0.5rem; margin:1rem 0; display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <p style="margin:0; color:#666; font-size:1.4rem; font-weight:500;">Số lượng sách còn:</p>
                    <h3 style="margin:0.5rem 0 0 0; color:#27ae60; font-size:3rem; font-weight:bold;" id="bookQty">--</h3>
                </div>
                <div style="text-align:right;">
                    <i class="fas fa-box-open" style="font-size:4rem; color:#27ae60; opacity:0.25;"></i>
                </div>
            </div>
            
            <p class="description" id="bookDescription">
                Đang tải thông tin sách...
            </p>

            <div class="actions">
                <input type="number" value="1" min="1" max="10" class="qty-input" id="qtyInput">
                <a href="#" class="btn" onclick="addToCartFromDetails(event)">Yêu Cầu Mượn</a>
                <a href="#" class="btn" id="cancelPreOrderBtn" onclick="handleCancelPreOrder(event)" style="display:none; background:#e74c3c;">Hủy Đặt Trước</a>
            </div>

            <div class="meta-info">
                <p>Tác giả: <span id="metaAuthor">--</span></p>
                <p>Thể loại: <span id="metaCategory">--</span></p>
                <p>Tình trạng: <span style="color:var(--green)" id="metaStatus">--</span></p>
            </div>
        </div>
    </div>
</section>

<section class="review-section">
    <h1 class="heading"> <span>Đánh giá sản phẩm</span> </h1>
    
    <div class="review-form">
        <h3>Gửi đánh giá của bạn</h3>
        <div class="star-widget" id="ratingWidget">
            <input type="radio" name="rate" id="rate-5" value="5"> <label for="rate-5" class="fas fa-star"></label>
            <input type="radio" name="rate" id="rate-4" value="4"> <label for="rate-4" class="fas fa-star"></label>
            <input type="radio" name="rate" id="rate-3" value="3"> <label for="rate-3" class="fas fa-star"></label>
            <input type="radio" name="rate" id="rate-2" value="2"> <label for="rate-2" class="fas fa-star"></label>
            <input type="radio" name="rate" id="rate-1" value="1"> <label for="rate-1" class="fas fa-star"></label>
        </div>
        <div class="textarea">
            <textarea id="reviewText" placeholder="Mô tả trải nghiệm của bạn..."></textarea>
        </div>
        <button class="btn" onclick="submitReview(event)">Gửi Đánh Giá</button>
        <p id="reviewMsg" style="text-align:center; margin-top:1rem; font-size:0.9rem;"></p>
    </div>
</section>

<section class="footer">
    <div class="credit"> created by <span>Nhóm 3</span> | all rights reserved! </div>
</section>

<script src="js/script.js"></script>
<script src="js/book-details.js"></script>

</html>
